<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>Storage Copier</h1>
      <p class="domain" id="currentDomain">—</p>
    </header>

    <!-- Paste Section (shown when clipboard has data) -->
    <section class="paste-section hidden" id="pasteSection">
      <div class="paste-info">
        <span class="paste-badge">剪貼簿</span>
        <span id="clipboardSource">—</span>
        <span class="paste-count" id="clipboardCount"></span>
      </div>
      <div class="paste-types" id="clipboardTypes"></div>
      <div class="paste-actions">
        <button class="btn btn-primary" id="pasteBtn">貼上到此網站</button>
        <button class="btn btn-ghost" id="clearClipboardBtn">清除</button>
      </div>
    </section>

    <hr class="divider hidden" id="pasteDivider">

    <!-- Memories Section -->
    <section class="memories-section" id="memoriesSection">
      <div class="section-header">
        <h2>記憶</h2>
        <span class="entry-count" id="memoryCount">0 筆</span>
      </div>
      <select class="memory-select" id="memorySelect"></select>
      <div class="memory-details" id="memoryDetails">
        <div class="memory-meta" id="memorySelectedMeta"></div>
        <div class="memory-types" id="memorySelectedTypes"></div>
      </div>
      <div class="memory-actions">
        <button class="btn btn-primary btn-small" id="applyMemoryBtn">套用</button>
        <button class="btn btn-secondary btn-small" id="copyMemoryBtn">剪貼簿</button>
        <button class="btn btn-ghost btn-small" id="deleteMemoryBtn">刪除</button>
      </div>
    </section>

    <!-- Copy Section -->
    <section class="copy-section">
      <div class="type-selector">
        <label class="chip">
          <input type="checkbox" value="sessionStorage"> sessionStorage
        </label>
        <label class="chip">
          <input type="checkbox" value="localStorage"> localStorage
        </label>
        <label class="chip">
          <input type="checkbox" value="cookies"> Cookies
        </label>
      </div>
      <button class="btn btn-secondary" id="readBtn">讀取</button>
    </section>

    <!-- Entry List -->
    <section class="entries-section hidden" id="entriesSection">
      <div class="entries-header">
        <label class="select-all">
          <input type="checkbox" id="selectAll"> 全選
        </label>
        <span class="entry-count" id="entryCount">0 筆</span>
      </div>
      <div class="entries-list" id="entriesList"></div>
      <div class="entry-actions">
        <button class="btn btn-primary" id="copyBtn">複製選取項目</button>
        <div class="memory-save">
          <input
            type="text"
            id="memoryName"
            placeholder="記憶名稱（可留空）"
            maxlength="80"
          >
          <button class="btn btn-secondary" id="saveMemoryBtn">儲存記憶</button>
        </div>
      </div>
    </section>

    <!-- Toast -->
    <div class="toast hidden" id="toast"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
